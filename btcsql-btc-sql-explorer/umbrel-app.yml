port: 5001
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  v1.8.7 – Much smaller database. The schema no longer stores three
  derivable/rarely-used columns: each transaction's block_timestamp and
  block_hash (now provided on demand by the new v_transactions view), and
  each input's raw scriptSig hex. This roughly cuts the fully-synced
  database size by ~20% (on top of v1.8.6), helping a full mainnet sync
  fit comfortably on disk. Queries that need a transaction's block time or
  hash should use the v_transactions view (the built-in examples already
  do). IMPORTANT: this schema change rebuilds the blockchain database from
  scratch on first launch (saved queries are kept) — so update sooner
  rather than later to avoid discarding sync progress.
submitter: Ignacio Fernandez
