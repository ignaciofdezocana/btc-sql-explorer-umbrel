defaultPassword: ""
releaseNotes: >-
  v1.8.8 – Stop the app from starving your Bitcoin node. Under heavy sync
  the app could use enough memory/CPU to push the whole device out of RAM,
  causing the system to kill Bitcoin Core. This release makes it a "good
  roommate": a hard 3GB / 2-CPU limit (down from 5GB / 3-CPU) guarantees
  plenty of RAM and cores stay free for the node, smaller RPC batches keep
  the node's load light, and DuckDB uses less memory. It also removes an
  old safeguard that wrongly deleted large (but healthy) databases on
  restart — your sync progress is now preserved across restarts. No schema
  change: updating keeps your existing synced data and resumes where it
  left off. Trade-off: the initial sync runs somewhat slower in exchange
  for not disrupting the node.
