path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  v1.8.5 – Diagnostics & logging overhaul to track down sync stalls.
  Adds persistent, timestamped logs under /data/logs that survive
  restarts (no more losing the evidence when the container restarts),
  plus a resource/heartbeat monitor that records memory, WAL, and disk
  usage every 15 seconds. A new "Diagnostics" button in the top bar
  downloads a single bundle (logs + system snapshot) you can share when
  the sync gets stuck. Also adds startup schema validation, a data
  directory writability check, automatic retries on block fetches with
  backoff, and clearer memory/checkpoint/Gunicorn warnings. No changes
  to query behavior or sync logic.
submitter: Ignacio Fernandez
