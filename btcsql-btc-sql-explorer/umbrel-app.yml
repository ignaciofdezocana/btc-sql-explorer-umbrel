manifestVersion: 1
id: btcsql-btc-sql-explorer
category: bitcoin
name: BTC SQL Explorer
version: "1.8.6"
tagline: Run SQL queries against your Bitcoin blockchain
description: >-
  BTC SQL Explorer lets you query your Bitcoin full node's blockchain data
  using SQL. It syncs blocks, transactions, inputs, and outputs from your
  node into a local DuckDB database and provides a modern web UI with a
  CodeMirror SQL editor, results table, charting, and CSV export.


  Write any SQL query against your own blockchain data — analyze fee
  markets, track whale transactions, study mining patterns, examine script
  types, and more. Includes a library of example queries to get started.


  Your data never leaves your device. The app connects to your Umbrel's
  Bitcoin Core node via local RPC and stores the SQL database on your
  device's storage.
developer: Ignacio Fernandez
website: https://github.com/ignaciofdezocana/btc-sql-explorer
dependencies:
  - bitcoin
repo: https://github.com/ignaciofdezocana/btc-sql-explorer-umbrel
support: https://github.com/ignaciofdezocana/btc-sql-explorer-umbrel/issues
port: 5001
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  v1.8.6 – Faster, lighter sync and clearer progress. The progress
  banner now shows transaction-weighted percentage (the honest measure)
  instead of block percentage, which previously raced to ~25% and then
  appeared stuck while grinding through the dense middle of the chain.
  Smaller write batches and more memory/CPU headroom (5GB / 3 CPUs) cut
  the out-of-memory pressure seen during sync and reduce disk spilling.
  The database schema no longer stores the redundant, derivable
  script_asm column, substantially shrinking the database and speeding
  up writes. IMPORTANT: this schema change rebuilds the blockchain
  database from scratch on first launch (saved queries are kept). If you
  need script disassembly in queries, derive it from script_hex.
submitter: Ignacio Fernandez
