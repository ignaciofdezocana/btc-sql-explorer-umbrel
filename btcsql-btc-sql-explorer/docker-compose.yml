version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: btcsql-btc-sql-explorer_web_1
      APP_PORT: 5001

  web:
    image: ignaciofdez/btc-sql-explorer:v1.8.8@sha256:686b1077a01ae4dbf02306433ed543f725b55a37d55ac4ed85dfc306b06791ed
    init: true
    restart: on-failure
    stop_grace_period: 1m
    # Tightened in v1.8.8 to be a "good roommate" for Bitcoin Core. The 5GB/3cpu
    # caps let the device run out of RAM overnight and the kernel OOM-killed the
    # node. A hard 3GB/2cpu cap guarantees ~12GB+ and 2 cores stay free for the
    # node and OS, so the device can't be starved. (Trade-off: a slower sync.)
    mem_limit: 3072m
    memswap_limit: 3072m
    cpus: 2.0
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      # Bitcoin Core RPC (injected by Umbrel)
      BITCOIN_RPC_HOST: $APP_BITCOIN_NODE_IP
      BITCOIN_RPC_PORT: $APP_BITCOIN_RPC_PORT
      BITCOIN_RPC_USER: $APP_BITCOIN_RPC_USER
      BITCOIN_RPC_PASS: $APP_BITCOIN_RPC_PASS
      BITCOIN_NETWORK: ${APP_BITCOIN_NETWORK:-mainnet}
      # Persistent data paths
      DB_PATH: /data/bitcoin_blockchain.db
      SAVED_QUERIES_PATH: /data/saved_queries.db
      # Sync tuning — kept lean so we coexist with the node (see mem cap above)
      DUCKDB_MEMORY_LIMIT: 1536MB
      DUCKDB_THREADS: "2"
      FLUSH_TX_THRESHOLD: "15000"
      # Smaller RPC batches = smaller memory/CPU spikes on Bitcoin Core
      RPC_MAX_BATCH: "50"
