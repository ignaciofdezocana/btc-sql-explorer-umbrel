version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: btcsql-btc-sql-explorer_web_1
      APP_PORT: 5001

  web:
    image: ignaciofdez/btc-sql-explorer:v1.8.7@sha256:6f482fdedfcbcfe782c042d24ce70f9403959d28e79f327c27dbbf1f63ae20e3
    init: true
    restart: on-failure
    stop_grace_period: 1m
    # Raised from 3.5GB/2cpu: gives DuckDB headroom (fewer disk spills, no
    # OOM-edge spikes) and more CPU for the heavy initial sync. The device has
    # 16GB/4cores; this leaves ~11GB and a core for the OS and Bitcoin Core.
    mem_limit: 5120m
    memswap_limit: 5120m
    cpus: 3.0
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      # Bitcoin Core RPC (injected by Umbrel)
      BITCOIN_RPC_HOST: $APP_BITCOIN_NODE_IP
      BITCOIN_RPC_PORT: $APP_BITCOIN_RPC_PORT
      BITCOIN_RPC_USER: $APP_BITCOIN_RPC_USER
      BITCOIN_RPC_PASS: $APP_BITCOIN_RPC_PASS
      BITCOIN_NETWORK: ${APP_BITCOIN_NETWORK:-mainnet}
      # Persistent data paths
      DB_PATH: /data/bitcoin_blockchain.db
      SAVED_QUERIES_PATH: /data/saved_queries.db
      # Sync tuning (matched to the raised caps above)
      DUCKDB_MEMORY_LIMIT: 2560MB
      DUCKDB_THREADS: "3"
      FLUSH_TX_THRESHOLD: "15000"
